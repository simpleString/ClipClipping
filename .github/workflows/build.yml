name: Build

on:
  push:
    tags-ignore: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            qt_host: linux
          - os: windows-latest
            qt_host: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev libpulse-dev

      - name: Install Qt 6.5.3
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: ${{ matrix.qt_host }}
          target: desktop
          modules: qtmultimedia qtquickcontrols2 qt5compat
          cache: true

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/package"

      - name: Build
        run: cmake --build build --config Release

      - name: Install portable bundle
        run: cmake --install build --config Release

      - name: Fix Linux Qt runtime layout
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          QT_BASE="${QT_ROOT_DIR:-}"
          if [ -z "$QT_BASE" ]; then
            QMAKE_BIN=$(command -v qmake)
            QT_BASE=$(dirname "$(dirname "$QMAKE_BIN")")
          fi
          QT_QML_DIR="$QT_BASE/qml"
          QT_PLUGINS_DIR="$QT_BASE/plugins"

          mkdir -p package/bin package/qml package/plugins

          cat > package/bin/qt.conf <<'EOF'
          [Paths]
          Prefix=..
          Plugins=plugins
          QmlImports=qml
          EOF

          cp -a "$QT_PLUGINS_DIR/platforms" package/plugins/
          if [ -d "$QT_PLUGINS_DIR/wayland-shell-integration" ]; then cp -a "$QT_PLUGINS_DIR/wayland-shell-integration" package/plugins/; fi
          if [ -d "$QT_PLUGINS_DIR/wayland-decoration-client" ]; then cp -a "$QT_PLUGINS_DIR/wayland-decoration-client" package/plugins/; fi
          if [ -d "$QT_PLUGINS_DIR/platformthemes" ]; then cp -a "$QT_PLUGINS_DIR/platformthemes" package/plugins/; fi
          if [ -d "$QT_PLUGINS_DIR/imageformats" ]; then cp -a "$QT_PLUGINS_DIR/imageformats" package/plugins/; fi
          if [ -d "$QT_PLUGINS_DIR/multimedia" ]; then cp -a "$QT_PLUGINS_DIR/multimedia" package/plugins/; fi
          if [ -d "$QT_PLUGINS_DIR/mediaservice" ]; then cp -a "$QT_PLUGINS_DIR/mediaservice" package/plugins/; fi

          for module_dir in QtQuick QtQuick.2 QtQml QtMultimedia; do
            if [ -d "$QT_QML_DIR/$module_dir" ]; then
              cp -a "$QT_QML_DIR/$module_dir" package/qml/
            fi
          done

      - name: Add FFmpeg (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p package/tools
          curl -L -o ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg.tar.xz
          ffmpeg_dir=$(find . -maxdepth 1 -type d -name 'ffmpeg-*-amd64-static' | head -n 1)
          cp "$ffmpeg_dir/ffmpeg" package/tools/
          cp "$ffmpeg_dir/ffprobe" package/tools/
          chmod +x package/tools/ffmpeg package/tools/ffprobe

      - name: Add FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package/tools -Force | Out-Null
          Invoke-WebRequest -Uri https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $ffmpeg = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ffmpeg.FullName package/tools/ffmpeg.exe
          Copy-Item $ffprobe.FullName package/tools/ffprobe.exe

      - name: Fix Windows Qt runtime layout
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "${{ github.workspace }}\package\bin\ClipClipping.exe"
          if (!(Test-Path $exe)) { throw "Executable not found: $exe" }
          windeployqt --release --qmldir "${{ github.workspace }}\src" --no-translations $exe
          @"
          [Paths]
          Prefix=.
          Plugins=plugins
          QmlImports=qml
          "@ | Set-Content -Path "${{ github.workspace }}\package\bin\qt.conf" -Encoding ascii

      - name: Archive portable package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: tar -czf ClipClipping-linux-portable.tar.gz -C package .

      - name: Archive portable package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path package\* -DestinationPath ClipClipping-windows-portable.zip

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ClipClipping-linux-portable
          path: ClipClipping-linux-portable.tar.gz
          if-no-files-found: error

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ClipClipping-windows-portable
          path: ClipClipping-windows-portable.zip
          if-no-files-found: error
