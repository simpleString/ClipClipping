name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            qt_host: linux
            package_name: ClipClipping-${{ github.ref_name }}-linux-x86_64.AppImage
          - os: windows-latest
            qt_host: windows
            package_name: ClipClipping-${{ github.ref_name }}-windows-portable.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev libpulse-dev

      - name: Install Qt 6.5.3
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: ${{ matrix.qt_host }}
          target: desktop
          modules: qtmultimedia qt5compat
          cache: true

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/package"

      - name: Build
        run: cmake --build build --config Release

      - name: Install portable bundle
        run: cmake --install build --config Release

      - name: Fix Linux Qt runtime layout
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          QT_BASE="${QT_ROOT_DIR:-}"
          if [ -z "$QT_BASE" ]; then
            QMAKE_BIN=$(command -v qmake)
            QT_BASE=$(dirname "$(dirname "$QMAKE_BIN")")
          fi
          QT_QML_DIR="$QT_BASE/qml"
          QT_PLUGINS_DIR="$QT_BASE/plugins"
          QT_LIB_DIR="$QT_BASE/lib"

          mkdir -p package/bin package/qml package/plugins package/lib

          cat > package/bin/qt.conf <<'EOF'
          [Paths]
          Prefix=..
          Plugins=plugins
          QmlImports=qml
          EOF

          cp -a "$QT_PLUGINS_DIR/platforms" package/plugins/
          if [ -d "$QT_PLUGINS_DIR/wayland-shell-integration" ]; then cp -a "$QT_PLUGINS_DIR/wayland-shell-integration" package/plugins/; fi
          if [ -d "$QT_PLUGINS_DIR/wayland-decoration-client" ]; then cp -a "$QT_PLUGINS_DIR/wayland-decoration-client" package/plugins/; fi
          if [ -d "$QT_PLUGINS_DIR/platformthemes" ]; then cp -a "$QT_PLUGINS_DIR/platformthemes" package/plugins/; fi
          if [ -d "$QT_PLUGINS_DIR/imageformats" ]; then cp -a "$QT_PLUGINS_DIR/imageformats" package/plugins/; fi
          if [ -d "$QT_PLUGINS_DIR/multimedia" ]; then cp -a "$QT_PLUGINS_DIR/multimedia" package/plugins/; fi
          if [ -d "$QT_PLUGINS_DIR/mediaservice" ]; then cp -a "$QT_PLUGINS_DIR/mediaservice" package/plugins/; fi

          cp -a "$QT_LIB_DIR"/libQt6*.so* package/lib/ || true
          cp -a "$QT_LIB_DIR"/libicu*.so* package/lib/ || true

          for module_dir in QtQuick QtQuick.2 QtQml QtMultimedia; do
            if [ -d "$QT_QML_DIR/$module_dir" ]; then
              cp -a "$QT_QML_DIR/$module_dir" package/qml/
            fi
          done

      - name: Add FFmpeg (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p package/tools
          curl -L -o ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg.tar.xz
          ffmpeg_dir=$(find . -maxdepth 1 -type d -name 'ffmpeg-*-amd64-static' | head -n 1)
          cp "$ffmpeg_dir/ffmpeg" package/tools/
          cp "$ffmpeg_dir/ffprobe" package/tools/
          chmod +x package/tools/ffmpeg package/tools/ffprobe

      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf AppDir
          mkdir -p AppDir/usr
          cp -a package/bin AppDir/usr/
          cp -a package/tools AppDir/usr/
          rm -f AppDir/usr/bin/qt.conf

          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/clipclipping.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=ClipClipping
          Exec=ClipClipping
          Icon=clipclipping
          Categories=AudioVideo;Video;
          EOF

          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp "${{ github.workspace }}/assets/ClipClippingIcon-256.png" AppDir/usr/share/icons/hicolor/256x256/apps/clipclipping.png

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          ln -sf linuxdeploy-plugin-qt-x86_64.AppImage linuxdeploy-plugin-qt

          export QML_SOURCES_PATHS="${{ github.workspace }}/src"
          export EXTRA_QT_PLUGINS="multimedia;platformthemes;wayland-shell-integration;wayland-decoration-client"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            -e AppDir/usr/bin/ClipClipping \
            -d AppDir/usr/share/applications/clipclipping.desktop \
            -i AppDir/usr/share/icons/hicolor/256x256/apps/clipclipping.png \
            --plugin qt \
            --output appimage

          mv ClipClipping-x86_64.AppImage "${{ matrix.package_name }}"

      - name: Add FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package/tools -Force | Out-Null
          Invoke-WebRequest -Uri https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $ffmpeg = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ffmpeg.FullName package/tools/ffmpeg.exe
          Copy-Item $ffprobe.FullName package/tools/ffprobe.exe

      - name: Fix Windows Qt runtime layout
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "${{ github.workspace }}\package\bin\ClipClipping.exe"
          if (!(Test-Path $exe)) { throw "Executable not found: $exe" }
          windeployqt --release --qmldir "${{ github.workspace }}\src" --no-translations $exe

          $qmake = (Get-Command qmake).Source
          $qtBase = Split-Path (Split-Path $qmake -Parent) -Parent
          $qtQml = Join-Path $qtBase "qml"
          $qtPlugins = Join-Path $qtBase "plugins"

          New-Item -ItemType Directory -Path "${{ github.workspace }}\package\qml" -Force | Out-Null
          New-Item -ItemType Directory -Path "${{ github.workspace }}\package\plugins" -Force | Out-Null

          foreach ($d in @("QtQuick", "QtQml", "QtMultimedia")) {
            $src = Join-Path $qtQml $d
            if (Test-Path $src) {
              Copy-Item $src "${{ github.workspace }}\package\qml" -Recurse -Force
            }
          }

          foreach ($d in @("platforms", "imageformats", "multimedia", "styles")) {
            $src = Join-Path $qtPlugins $d
            if (Test-Path $src) {
              Copy-Item $src "${{ github.workspace }}\package\plugins" -Recurse -Force
            }
          }

          @"
          [Paths]
          Prefix=..
          Plugins=plugins
          QmlImports=qml
          "@ | Set-Content -Path "${{ github.workspace }}\package\bin\qt.conf" -Encoding ascii

      - name: Archive portable package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: test -f "${{ matrix.package_name }}"

      - name: Archive portable package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path package\* -DestinationPath "${{ matrix.package_name }}"

      - name: Publish GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.package_name }}
          generate_release_notes: true
