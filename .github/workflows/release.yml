name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            qt_host: linux
            package_name: ClipClipping-${{ github.ref_name }}-linux-portable.tar.gz
          - os: windows-latest
            qt_host: windows
            package_name: ClipClipping-${{ github.ref_name }}-windows-portable.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev libpulse-dev

      - name: Install Qt 6.5.3
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: ${{ matrix.qt_host }}
          target: desktop
          modules: qtmultimedia qt5compat
          cache: true

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Install portable bundle
        run: cmake --install build --config Release --prefix package

      - name: Add FFmpeg (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p package/tools
          curl -L -o ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg.tar.xz
          ffmpeg_dir=$(find . -maxdepth 1 -type d -name 'ffmpeg-*-amd64-static' | head -n 1)
          cp "$ffmpeg_dir/ffmpeg" package/tools/
          cp "$ffmpeg_dir/ffprobe" package/tools/
          chmod +x package/tools/ffmpeg package/tools/ffprobe

      - name: Add FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package/tools -Force | Out-Null
          Invoke-WebRequest -Uri https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $ffmpeg = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ffmpeg.FullName package/tools/ffmpeg.exe
          Copy-Item $ffprobe.FullName package/tools/ffprobe.exe

      - name: Archive portable package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: tar -czf "${{ matrix.package_name }}" -C package .

      - name: Archive portable package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path package\* -DestinationPath "${{ matrix.package_name }}"

      - name: Publish GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.package_name }}
          generate_release_notes: true
